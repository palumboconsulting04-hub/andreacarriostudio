name: Informe automático

# Envía el informe (Meta Ads + inscritos) por correo con Resend.
# 4 envíos al día. GitHub usa UTC; en España (verano UTC+2) equivale a las
# 8:00, 13:00, 18:00 y 22:00. En invierno se desplaza 1 h.
on:
  schedule:
    - cron: '0 6,11,16,20 * * *'   # 8, 13, 18, 22 h (España, verano)
  workflow_dispatch: {}   # permite lanzarlo a mano desde la pestaña "Actions"

jobs:
  enviar-informe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Enviar informe por correo
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_API_VERSION: ${{ secrets.META_API_VERSION }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
        run: node tools/reporte/reporte.mjs --hours 3
